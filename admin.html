<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DevIndra Mart Admin</title><link rel="icon" href="logo.svg"><link rel="stylesheet" href="style.css"></head><body>
<div class="app">
  <div class="topbar"><div class="brand"><img src="logo.svg"><div><div class="subtle">ADMIN PANEL</div><h1 class="title">DevIndra Mart Admin</h1></div></div><a class="btn secondary smallbtn" href="index.html">Open customer app</a></div>
  <div class="section stack">
    <div class="card stack">
      <div class="between"><h2 class="title" style="font-size:18px">Store settings</h2><button id="seedDemoBtn" class="btn warn smallbtn" style="width:auto">Seed demo data</button></div>
      <input id="storeName" class="input" placeholder="Store name">
      <input id="storeTagline" class="input" placeholder="Tagline">
      <input id="noticeText" class="input" placeholder="Top notification text">
      <input id="whatsappNumber" class="input" placeholder="WhatsApp number">
      <div class="row"><input id="minOrder" class="input" type="number" placeholder="Minimum order"><input id="freeNote" class="input" placeholder="Small helper note"></div>
      <textarea id="deliveryRulesText" class="textarea" placeholder="Delivery rules note"></textarea>
      <button id="saveSettingsBtn" class="btn">Save settings</button>
    </div>

    <div class="card stack">
      <h2 class="title" style="font-size:18px">Promos / Ads</h2>
      <div class="row"><input id="promoTitle" class="input" placeholder="Promo title"><input id="promoSubtitle" class="input" placeholder="Promo subtitle"></div>
      <div class="row"><select id="promoType" class="input"><option value="image">Image</option><option value="video">Video</option></select><input id="promoMedia" class="input" placeholder="Image / video URL"></div>
      <button id="addPromoBtn" class="btn">Add promo</button>
      <div id="promoList" class="table-list"></div>
    </div>

    <div class="card stack">
      <h2 class="title" style="font-size:18px">Categories & Subcategories</h2>
      <div class="row"><input id="categoryName" class="input" placeholder="Category name"><input id="categoryImage" class="input" placeholder="Category image URL"></div>
      <div class="row"><input id="categorySupport" class="input" placeholder="Support number"><input id="categoryAction" class="input" placeholder="Action type: whatsapp/call/link"></div>
      <input id="categorySubs" class="input" placeholder="Subcategories (comma separated)">
      <button id="addCategoryBtn" class="btn">Add category</button>
      <div id="categoryList" class="table-list"></div>
    </div>

    <div class="card stack">
      <h2 class="title" style="font-size:18px">Products</h2>
      <div class="row"><input id="productName" class="input" placeholder="Product name"><input id="productPrice" class="input" type="number" placeholder="Price"></div>
      <div class="row"><input id="productMrp" class="input" type="number" placeholder="MRP"><input id="productImage" class="input" placeholder="Product image URL"></div>
      <div class="row"><select id="productCategory" class="input"></select><input id="productSubcategory" class="input" placeholder="Subcategory"></div>
      <div class="row"><input id="productBadge" class="input" placeholder="Badge e.g. Bestseller"><input id="productKeywords" class="input" placeholder="Keywords for voice match"></div>
      <button id="addProductBtn" class="btn">Add product</button>
      <div id="productList" class="table-list"></div>
    </div>

    <div class="card stack">
      <h2 class="title" style="font-size:18px">Orders</h2>
      <div id="ordersList" class="table-list"></div>
    </div>

    <div class="card stack">
      <h2 class="title" style="font-size:18px">Future integrations</h2>
      <div class="row"><input id="riderApp" class="input" placeholder="Rider app / link"><input id="billingApp" class="input" placeholder="Billing app / link"></div>
      <input id="receiptPrefix" class="input" placeholder="Receipt prefix">
      <button id="saveFutureBtn" class="btn secondary">Save future integrations</button>
    </div>
  </div>
</div>
<script src="firebase-config.js"></script>
<script type="module" src="admin.js"></script>
</body></html>
