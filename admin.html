<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevIndra Mart Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background:#eef1f7">
  <div class="topbar">
    <div class="brand-wrap">
      <img src="logo.svg" class="header-logo" alt="logo" />
      <div>
        <div class="brand-name">Admin Panel</div>
        <div class="brand-tagline">Simple control panel</div>
      </div>
    </div>
  </div>

  <div class="card" style="margin:16px">
    <h3>Store Settings</h3>
    <input id="storeNameInput" placeholder="Store Name" />
    <input id="taglineInput" placeholder="Tagline" />
    <input id="supportPhoneInput" placeholder="Support Phone" />
    <input id="supportWhatsAppInput" placeholder="Support WhatsApp" />
    <input id="minOrderInput" type="number" placeholder="Min Order" />
    <textarea id="notificationTextInput" placeholder="Notification text"></textarea>
    <button id="saveSettingsBtn" class="primary-btn" type="button">Save Settings</button>
  </div>

  <div class="card" style="margin:16px">
    <h3>Add Category</h3>
    <input id="catNameInput" placeholder="Category name" />
    <input id="catSupportTypeInput" placeholder="Action type: call / whatsapp / link" />
    <input id="catSupportValueInput" placeholder="Support value" />
    <input id="catSubInput" placeholder="Subcategories comma separated" />
    <button id="addCategoryBtn" class="primary-btn" type="button">Add Category</button>
  </div>

  <div class="card" style="margin:16px">
    <h3>Add Product</h3>
    <input id="prodNameInput" placeholder="Product name" />
    <input id="prodCategoryInput" placeholder="Category id (kirana/fruits/...)" />
    <input id="prodSubCategoryInput" placeholder="Subcategory" />
    <input id="prodPriceInput" type="number" placeholder="Price" />
    <input id="prodImageInput" placeholder="Image URL" />
    <button id="addProductBtn" class="primary-btn" type="button">Add Product</button>
  </div>

  <div class="card" style="margin:16px">
    <h3>Orders</h3>
    <div id="ordersList"></div>
  </div>

  <script src="data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
