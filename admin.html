<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>DevIndra Mart Admin</title>
  <link rel="icon" href="logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-app">
    <div class="topbar"><div class="brand"><img src="logo.svg" alt="logo"><div><div class="tiny muted">ADMIN PANEL</div><div style="font-weight:700">DevIndra Mart Control</div></div></div><a class="btn secondary" style="width:auto;padding:10px 12px" href="index.html">Customer App</a></div>
    <div class="admin-header"><div class="small muted">Simple form based control panel</div><h1 class="title" style="margin-top:6px">Admin Panel</h1></div>
    <div class="admin-tabs" id="adminTabs"></div>

    <div id="tab-dashboard" class="section"></div>
    <div id="tab-settings" class="section hidden">
      <div class="card stack">
        <input id="s_storeName" class="input" placeholder="App / Store Name">
        <input id="s_heroTitle" class="input" placeholder="Hero line">
        <input id="s_heroSub" class="input" placeholder="Sub line">
        <input id="s_logoUrl" class="input" placeholder="Logo URL">
        <input id="s_supportPhone" class="input" placeholder="Support Phone">
        <input id="s_whatsappNumber" class="input" placeholder="WhatsApp Number with country code">
        <input id="s_minOrderValue" class="input" type="number" placeholder="Minimum order value">
        <textarea id="s_topNotice" class="textarea" placeholder="Top moving offer text"></textarea>
        <label><input id="s_notificationEnabled" type="checkbox"> Notification enabled</label>
        <textarea id="s_notificationText" class="textarea" placeholder="Notification text"></textarea>
        <textarea id="s_helpText" class="textarea" placeholder="Help center text"></textarea>
        <button class="btn" id="saveSettingsBtn">Save Settings</button>
      </div>
      <div class="card stack">
        <div style="font-weight:700">Delivery Charges</div>
        <div class="small muted">₹0–₹999 = ₹50 • ₹1000–₹2999 = ₹30 • ₹3000–₹4999 = ₹20 • ₹5000+ = ₹10</div>
      </div>
    </div>

    <div id="tab-categories" class="section hidden">
      <div class="card stack">
        <input id="c_name" class="input" placeholder="Category Name">
        <input id="c_image" class="input" placeholder="Category Image URL">
        <input id="c_order" class="input" type="number" placeholder="Order">
        <select id="c_supportType" class="select"><option value="call">Call</option><option value="whatsapp">WhatsApp</option><option value="link">Link</option><option value="none">None</option></select>
        <input id="c_supportValue" class="input" placeholder="Support number / link">
        <button class="btn" id="saveCategoryBtn">Add Category</button>
      </div>
      <div id="categoriesList" class="list"></div>
    </div>

    <div id="tab-products" class="section hidden">
      <div class="card stack">
        <input id="p_name" class="input" placeholder="Item Name">
        <input id="p_brand" class="input" placeholder="Brand">
        <input id="p_size" class="input" placeholder="Size">
        <input id="p_image" class="input" placeholder="Image URL">
        <input id="p_price" class="input" type="number" placeholder="Price">
        <input id="p_mrp" class="input" type="number" placeholder="MRP">
        <select id="p_category" class="select"></select>
        <label><input id="p_stock" type="checkbox" checked> In stock</label>
        <button class="btn" id="saveProductBtn">Add Product</button>
      </div>
      <div id="productsList" class="list"></div>
    </div>

    <div id="tab-notification" class="section hidden">
      <div class="card stack">
        <textarea id="n_text" class="textarea" placeholder="Notification text"></textarea>
        <label><input id="n_enabled" type="checkbox"> Show notification</label>
        <button class="btn" id="saveNotificationBtn">Save Notification</button>
      </div>
      <div class="card stack">
        <div style="font-weight:700">Promo Slider</div>
        <select id="promo_type" class="select"><option value="image">Banner Image</option><option value="video">Video</option></select>
        <input id="promo_url" class="input" placeholder="Image / Video URL">
        <input id="promo_title" class="input" placeholder="Promo title">
        <input id="promo_subtitle" class="input" placeholder="Promo subtitle">
        <input id="promo_order" class="input" type="number" placeholder="Order">
        <label><input id="promo_enabled" type="checkbox" checked> Active</label>
        <button class="btn" id="savePromoBtn">Add Promo</button>
      </div>
      <div id="promosList" class="list"></div>
    </div>

    <div id="tab-orders" class="section hidden"><div id="ordersList" class="list"></div></div>

    <div id="tab-future" class="section hidden">
      <div class="card stack">
        <div style="font-weight:700">Future Integrations Structure</div>
        <label><input id="f_riderEnabled" type="checkbox"> Rider App Enabled</label>
        <input id="f_riderAppName" class="input" placeholder="Rider App Name">
        <input id="f_riderAppLink" class="input" placeholder="Rider App Link">
        <label><input id="f_billingEnabled" type="checkbox"> Billing App Enabled</label>
        <input id="f_billingAppName" class="input" placeholder="Billing App Name">
        <input id="f_billingAppLink" class="input" placeholder="Billing App Link">
        <label><input id="f_receiptEnabled" type="checkbox"> Receipt Enabled</label>
        <input id="f_receiptPrefix" class="input" placeholder="Receipt Prefix">
        <input id="f_receiptTemplate" class="input" placeholder="Receipt Template">
        <button class="btn" id="saveFutureBtn">Save Future Structure</button>
      </div>
    </div>
    <div class="footer-space"></div>
  </div>

  <script src="firebase-config.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
