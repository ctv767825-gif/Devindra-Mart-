<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devindra Mart Admin</title>
  <link rel="stylesheet" href="style.css" />
  <script src="firebase-config.js"></script>
  <script type="module" src="admin.js"></script>
</head>
<body class="admin-body">
  <div class="admin-wrap">
    <aside class="admin-sidebar glass-card">
      <img src="logo.svg" class="admin-logo" alt="logo" />
      <div class="admin-title">Admin Panel</div>
      <div class="admin-menu">
        <button class="admin-menu-btn active" data-tab="settingsTab">Store</button>
        <button class="admin-menu-btn" data-tab="categoriesTab">Categories</button>
        <button class="admin-menu-btn" data-tab="productsTab">Products</button>
        <button class="admin-menu-btn" data-tab="promosTab">Promos</button>
        <button class="admin-menu-btn" data-tab="ordersTab">Orders</button>
        <button class="admin-menu-btn" data-tab="futureTab">Future</button>
      </div>
    </aside>

    <main class="admin-main">
      <section id="settingsTab" class="admin-tab glass-card active">
        <h2>Store Settings</h2>
        <div class="admin-grid">
          <input id="storeNameInput" class="input" placeholder="Store name" />
          <input id="taglineInput" class="input" placeholder="Tagline" />
          <input id="noticeInput" class="input" placeholder="Top notice text" />
          <input id="whatsappInput" class="input" placeholder="WhatsApp number" value="7678256489" />
          <input id="supportInput" class="input" placeholder="Support number" value="7678256489" />
          <input id="minOrderInput" class="input" type="number" placeholder="Min order" value="500" />
          <input id="storeMapLinkInput" class="input" placeholder="Store map link / current location link" />
          <input id="logoInput" class="input" placeholder="Logo URL (optional)" />
        </div>
        <button id="saveSettingsBtn" class="primary-btn">Save Settings</button>
      </section>

      <section id="categoriesTab" class="admin-tab glass-card">
        <h2>Categories</h2>
        <div class="admin-grid">
          <input id="catNameEn" class="input" placeholder="Category (English)" />
          <input id="catNameHi" class="input" placeholder="Category (Hindi)" />
          <input id="catNameHinglish" class="input" placeholder="Category (Hinglish)" />
          <input id="catSupport" class="input" placeholder="Support number" value="7678256489" />
          <input id="catImage" class="input" placeholder="Category image URL" />
          <input id="catSubs" class="input" placeholder="Subcategories (comma separated)" />
        </div>
        <button id="addCategoryBtn" class="primary-btn">Add Category</button>
        <div id="adminCategoryList" class="admin-list"></div>
      </section>

      <section id="productsTab" class="admin-tab glass-card">
        <h2>Products</h2>
        <div class="admin-grid">
          <input id="prodNameEn" class="input" placeholder="Product (English)" />
          <input id="prodNameHi" class="input" placeholder="Product (Hindi)" />
          <input id="prodNameHinglish" class="input" placeholder="Product (Hinglish)" />
          <input id="prodCategory" class="input" placeholder="Category" />
          <input id="prodSubcategory" class="input" placeholder="Subcategory" />
          <input id="prodPrice" class="input" type="number" placeholder="Price" />
          <input id="prodImage" class="input" placeholder="Image URL" />
          <input id="prodBadge" class="input" placeholder="Badge (optional)" />
        </div>
        <button id="addProductBtn" class="primary-btn">Add Product</button>
        <div id="adminProductList" class="admin-list"></div>
      </section>

      <section id="promosTab" class="admin-tab glass-card">
        <h2>Promos / Ads</h2>
        <div class="admin-grid">
          <input id="promoTitle" class="input" placeholder="Promo title" />
          <input id="promoText" class="input" placeholder="Promo text" />
          <select id="promoType" class="input"><option value="image">Image</option><option value="video">Video</option></select>
          <input id="promoMedia" class="input" placeholder="Image / Video URL" />
        </div>
        <button id="addPromoBtn" class="primary-btn">Add Promo</button>
        <div id="adminPromoList" class="admin-list"></div>
      </section>

      <section id="ordersTab" class="admin-tab glass-card">
        <h2>Orders</h2>
        <div id="adminOrders" class="admin-list"></div>
      </section>

      <section id="futureTab" class="admin-tab glass-card">
        <h2>Future Integrations</h2>
        <div class="admin-grid">
          <input id="riderAppName" class="input" placeholder="Rider app name" />
          <input id="riderAppLink" class="input" placeholder="Rider app link" />
          <input id="billingAppName" class="input" placeholder="Billing app name" />
          <input id="billingAppLink" class="input" placeholder="Billing app link" />
          <input id="receiptPrefix" class="input" placeholder="Receipt prefix" />
        </div>
        <button id="saveFutureBtn" class="primary-btn">Save Future Settings</button>
        <button id="seedDemoBtn" class="secondary-btn">Seed Demo Data</button>
      </section>
    </main>
  </div>
</body>
</html>
