<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Devindra Mart Admin</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f4f7fb;margin:0}
    .wrap{max-width:980px;margin:0 auto;padding:20px}
    .card{background:#fff;border-radius:20px;padding:18px;margin-bottom:18px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
    h1,h2{margin:0 0 14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    input,textarea{width:100%;box-sizing:border-box;padding:14px 16px;border:1px solid #dfe5f0;border-radius:14px}
    button{background:#1e3a8a;color:#fff;border:none;border-radius:14px;padding:12px 16px;font-weight:700}
    .danger{background:#b91c1c}
    .small{padding:8px 12px;border-radius:10px}
    .row-item{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px;border:1px solid #eef2f7;border-radius:14px;margin-top:10px}
    .meta{font-size:12px;color:#64748b;margin-top:4px}
    @media (max-width:700px){.grid,.grid-3{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Admin Panel</h1>
      <div class="meta">Firestore save fix patch</div>
    </div>

    <div class="card">
      <h2>Store Settings</h2>
      <div class="grid">
        <input id="storeName" placeholder="Store name" />
        <input id="tagline" placeholder="Tagline" />
        <input id="noticeText" placeholder="Notification text" />
        <input id="whatsappNumber" placeholder="WhatsApp number" value="7678256489" />
        <input id="supportNumber" placeholder="Support number" value="7678256489" />
        <input id="minOrder" placeholder="Min order" type="number" value="500" />
        <input id="delivery0to999" placeholder="0-999 delivery" type="number" value="50" />
        <input id="delivery1000to2999" placeholder="1000-2999 delivery" type="number" value="30" />
        <input id="delivery3000to4999" placeholder="3000-4999 delivery" type="number" value="20" />
        <input id="delivery5000plus" placeholder="5000+ delivery" type="number" value="10" />
        <input id="storeMapLink" placeholder="Store map link / current location link" />
      </div>
      <div style="margin-top:12px"><button id="saveSettingsBtn">Save Settings</button></div>
    </div>

    <div class="card">
      <h2>Add Category</h2>
      <div class="grid">
        <input id="catName" placeholder="Category name" />
        <input id="catSubcategory" placeholder="Subcategory (optional)" />
        <input id="catSupport" placeholder="Support number" value="7678256489" />
        <input id="catImage" placeholder="Image URL" />
        <input id="catAction" placeholder="Action type (whatsapp/call/link)" value="whatsapp" />
      </div>
      <div style="margin-top:12px"><button id="addCategoryBtn">Add Category</button></div>
      <div id="categoriesList"></div>
    </div>

    <div class="card">
      <h2>Add Product</h2>
      <div class="grid">
        <input id="prodName" placeholder="Product name" />
        <input id="prodCategory" placeholder="Category" />
        <input id="prodSubcategory" placeholder="Subcategory" />
        <input id="prodPrice" placeholder="Price" type="number" />
        <input id="prodImage" placeholder="Image URL" />
        <input id="prodStock" placeholder="Stock label" value="In Stock" />
      </div>
      <div style="margin-top:12px"><button id="addProductBtn">Add Product</button></div>
      <div id="productsList"></div>
    </div>
  
    <div class="card">
      <h2>Add Promo</h2>
      <div class="grid">
        <input id="promoTitle" placeholder="Promo title" />
        <input id="promoText" placeholder="Promo text" />
        <input id="promoMedia" placeholder="Promo image / video URL" />
      </div>
      <div style="margin-top:12px"><button id="addPromoBtn">Add Promo</button></div>
      <div id="promosList"></div>
    </div>
</div>

  <script src="./firebase-config.js"></script>
  <script type="module" src="./admin.js"></script>
</body>
</html>
