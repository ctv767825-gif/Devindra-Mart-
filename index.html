<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DevIndra Mart</title>
<link rel="manifest" href="manifest.json"><link rel="icon" href="logo.svg"><meta name="theme-color" content="#0f172a">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app" id="appRoot">
  <div id="loginView" class="login-wrap">
    <div class="login-hero">
      <div class="between"><div class="brand"><img src="logo.svg"><div><div class="subtle" data-i18n="welcomeLabel">WELCOME</div><h1 class="title" id="storeNameLogin">DevIndra Mart</h1></div></div><div class="pill" data-i18n="quickDelivery">Fast delivery</div></div>
      <p class="subtle" id="storeTagline">Ab ghar tak paaye bazaar jaise rate.</p>
      <div class="langs" style="margin-top:12px">
        <button class="lang-btn" data-lang="hinglish">Hinglish</button>
        <button class="lang-btn" data-lang="en">English</button>
        <button class="lang-btn" data-lang="hi">हिंदी</button>
      </div>
    </div>
    <div class="login-card">
      <div class="subtle" style="font-weight:700;margin-bottom:10px" data-i18n="loginFirst">LOGIN FIRST</div>
      <input id="loginPhone" class="input" type="tel" inputmode="numeric" placeholder="Enter mobile number">
      <button id="continueBtn" class="btn" style="margin-top:14px" data-i18n="continue">Continue</button>
      <div id="robotBox" class="card hidden" style="margin:14px 0 0;padding:14px">
        <label class="between" style="justify-content:flex-start">
          <input id="robotCheck" type="checkbox"><span data-i18n="notRobot">I'm not a robot</span>
        </label>
        <button id="verifyBtn" class="btn" style="margin-top:12px" data-i18n="verifyContinue">Verify & Continue</button>
      </div>
      <div class="form-grid" style="margin-top:14px">
        <div class="card" style="margin:0;padding:14px;text-align:center"><div class="icon">🛍️</div><div class="small" data-i18n="quickOrder">Quick order</div></div>
        <div class="card" style="margin:0;padding:14px;text-align:center"><div class="icon">💬</div><div class="small" data-i18n="whatsAppOrder">WhatsApp order</div></div>
      </div>
    </div>
  </div>

  <div id="addressView" class="login-wrap hidden">
    <div class="login-hero"><div class="between"><div><div class="subtle" data-i18n="deliveryAddress">DELIVERY ADDRESS</div><h2 class="title" data-i18n="saveAddress">Save your address</h2></div><img src="logo.svg" style="width:48px;height:48px;border-radius:14px"></div></div>
    <div class="login-card">
      <div class="form-grid">
        <input id="addrName" class="input" placeholder="Name">
        <input id="addrPhone" class="input" placeholder="Phone" disabled>
        <input id="addrLine" class="input full" placeholder="Full Address">
        <input id="addrLandmark" class="input" placeholder="Landmark">
        <input id="addrCity" class="input" placeholder="City">
        <input id="addrState" class="input" placeholder="State">
        <input id="addrPincode" class="input" placeholder="Pincode">
        <textarea id="addrNote" class="textarea full" placeholder="Delivery note (optional)"></textarea>
      </div>
      <div class="row" style="margin-top:12px"><button id="getLocationBtn" class="btn secondary" data-i18n="useCurrentLocation">Use current location</button><button id="saveAddressBtn" class="btn" data-i18n="saveOpenApp">Save & Open App</button></div>
      <div id="locationStatus" class="subtle" style="margin-top:10px"></div>
    </div>
  </div>

  <div id="mainView" class="hidden">
    <div class="topbar">
      <div class="brand"><img src="logo.svg"><div><div class="subtle" id="topWelcome">Welcome back</div><h1 class="title" id="storeNameTop">DevIndra Mart</h1></div></div>
      <div class="row"><button id="langToggleBtn" class="icon-btn" title="Language">🌐</button><button id="micBtn" class="icon-btn" title="Voice">🎤</button></div>
    </div>
    <div id="noticeBar" class="notice hidden"></div>
    <div class="section">
      <div id="promoSlider" class="carousel hidden"></div>
    </div>
    <div class="searchbar"><span>🔎</span><input id="searchInput" placeholder="Search items, brands, category"><button id="clearSearchBtn" class="icon-btn smallbtn">✕</button></div>
    <div id="topCategories" class="chips"></div>
    <div class="section between" style="padding-top:4px"><div><h2 class="title" style="font-size:18px" data-i18n="allProducts">All Products</h2><div class="subtle" id="subheadText">Browse by category</div></div><div class="row"><button id="gridBtn" class="icon-btn" title="Grid">▦</button><button id="listBtn" class="icon-btn" title="List">☰</button></div></div>
    <div class="section"><div id="productsGrid" class="grid"></div></div>
  </div>
</div>

<div id="sheetBackdrop" class="sheet-backdrop hidden"></div>
<div id="categorySheet" class="sheet hidden"></div>
<div id="helpSheet" class="sheet hidden"></div>
<div id="profileSheet" class="sheet hidden"></div>
<div id="cartSheet" class="sheet hidden"></div>
<div id="langSheet" class="sheet hidden"></div>

<div id="cartBar" class="cartbar hidden"><div><div style="font-weight:800" data-i18n="cartReady">Cart ready</div><div class="small" id="cartBarText"></div></div><button id="openCartBtn" class="btn secondary" style="width:auto;padding:10px 14px" data-i18n="openCart">Open Cart</button></div>

<nav class="navbar hidden" id="bottomNav">
  <button class="nav-btn active" data-nav="home"><span class="icon">🏠</span><span data-i18n="home">Home</span></button>
  <button class="nav-btn" data-open="help"><span class="icon">💬</span><span data-i18n="support">Support</span></button>
  <button class="nav-btn" data-open="category"><span class="icon">📂</span><span data-i18n="category">Category</span></button>
  <button class="nav-btn" data-open="cart"><span class="icon">🛒</span><span data-i18n="cart">Cart</span></button>
  <button class="nav-btn" data-open="profile"><span class="icon">👤</span><span data-i18n="profile">Profile</span></button>
</nav>

<script src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
</body></html>
